<style>
  :root{
    --ruby:#DC2626; --ruby-deep:#7F1D1D; --ink:#0f1115; --slate:#475569;
    --line:#e7e9ee; --bg:#ffffff; --bg-soft:#f7f8fb; --radius:18px;
    --grad:linear-gradient(135deg,#DC2626,#7F1D1D);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body.lm{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
  .lm a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  /* nav */
  .nav{position:sticky;top:0;z-index:20;backdrop-filter:saturate(160%) blur(10px);
    background:rgba(255,255,255,.82);border-bottom:1px solid var(--line)}
  .nav .wrap{display:flex;align-items:center;gap:14px;height:64px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em}
  .glyph{width:32px;height:32px;border-radius:9px;display:block;
    box-shadow:0 6px 16px -6px rgba(220,38,38,.6)}
  .nav nav{margin-left:auto;display:flex;gap:26px;color:var(--slate);font-weight:600;font-size:14px}
  .nav nav a:hover{color:var(--ink)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;padding:11px 18px;
    border-radius:12px;border:1px solid transparent;transition:.15s}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 10px 24px -10px rgba(220,38,38,.7)}
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-ghost{border-color:var(--line);color:var(--ink);background:#fff}
  .btn-ghost:hover{border-color:#cfd4dd}
  /* hero */
  .hero{padding:74px 0 30px;background:
    radial-gradient(900px 380px at 78% -8%,rgba(220,38,38,.10),transparent 60%),
    radial-gradient(700px 320px at 0% 0%,rgba(127,29,29,.06),transparent 55%)}
  .hero .wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ruby-deep);
    background:#fdecec;border:1px solid #f6d5d5;padding:6px 12px;border-radius:999px}
  h1.head{font-size:54px;line-height:1.04;letter-spacing:-.035em;font-weight:850;margin:0}
  h1.head .accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:18.5px;color:var(--slate);margin:18px 0 26px;max-width:540px}
  .cta{display:flex;gap:12px;flex-wrap:wrap}
  .trust{margin-top:22px;display:flex;gap:22px;flex-wrap:wrap;color:var(--slate);font-size:13px;font-weight:600}
  .trust b{color:var(--ink)}
  /* terminal */
  .term{background:#0d1117;border-radius:16px;box-shadow:0 40px 80px -32px rgba(15,17,21,.55),0 0 0 1px #1c2330;
    overflow:hidden;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
  .term .bar{display:flex;align-items:center;gap:7px;padding:12px 14px;background:#11161f;border-bottom:1px solid #1c2330}
  .term .bar i{width:11px;height:11px;border-radius:50%;display:block}
  .term .bar .t{margin-left:10px;color:#6b7686;font-size:12px}
  .term pre{margin:0;padding:18px 18px 22px;font-size:13px;line-height:1.7;color:#c9d4e3;white-space:pre-wrap}
  .c-com{color:#5b6675}.c-cmd{color:#7ee787}.c-str{color:#a5d6ff}.c-key{color:#ff9eb1}.c-num{color:#f0b86e}.c-out{color:#8b94a3}
  /* logos strip */
  .strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--bg-soft)}
  .strip .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 24px;text-align:center}
  .strip .lead-line{color:#8893a4;font-weight:700;font-size:13.5px;letter-spacing:.02em}
  .strip b{color:var(--ink)}
  .mods{display:flex;flex-wrap:wrap;justify-content:center;gap:7px 8px;max-width:920px}
  .mods a{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12px;font-weight:600;color:var(--slate);
    background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px 10px;transition:.15s}
  .mods a:hover{color:var(--ruby-deep);border-color:#f6d5d5;background:#fdecec}
  /* section */
  section{padding:74px 0}
  .eyebrow{color:var(--ruby);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  h2{font-size:34px;letter-spacing:-.03em;font-weight:820;margin:8px 0 0}
  .lead{color:var(--slate);font-size:17px;margin:14px 0 0;max-width:620px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
  .card{border:1px solid var(--line);border-radius:var(--radius);padding:24px;background:#fff;transition:.18s}
  .card:hover{box-shadow:0 20px 40px -24px rgba(15,17,21,.22);transform:translateY(-3px);border-color:#e0e3ea}
  .ico{width:42px;height:42px;border-radius:12px;background:#fdecec;display:grid;place-items:center;font-size:20px;margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:17px;letter-spacing:-.01em}
  .card p{margin:0;color:var(--slate);font-size:14.5px}
  /* stats */
  .stats{background:var(--ink);color:#fff;border-radius:26px;padding:42px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center;
    box-shadow:0 40px 80px -40px rgba(15,17,21,.6)}
  .stats .n{font-size:40px;font-weight:850;letter-spacing:-.03em;background:linear-gradient(135deg,#fff,#ffd9d9);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stats .l{color:#9aa3b2;font-size:13.5px;margin-top:4px}
  /* roadmap */
  .road{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:36px}
  .ph{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:#fff}
  .ph .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .ph h4{margin:0;font-size:14.5px}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .tag.ready{background:#e7f6ec;color:#1a7f37}.tag.active{background:#fdecec;color:var(--ruby-deep)}
  .ph p{margin:8px 0 0;color:var(--slate);font-size:13px}
  .ph p code{background:var(--bg-soft);border:1px solid var(--line);border-radius:5px;padding:0 4px;font-size:12px}
  /* cta band */
  .band{background:var(--grad);border-radius:26px;padding:54px;color:#fff;text-align:center;position:relative;overflow:hidden}
  .band:after{content:"";position:absolute;inset:0;background:radial-gradient(600px 240px at 80% 120%,rgba(255,255,255,.18),transparent)}
  .band h2{color:#fff;font-size:32px}
  .band p{color:#ffe1e1;margin:12px auto 26px;max-width:520px;position:relative;z-index:1}
  .band .btn-ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);color:#fff;position:relative;z-index:1}
  footer{padding:40px 0;color:#8893a4;font-size:13.5px;border-top:1px solid var(--line)}
  footer .wrap{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between}
  @media(max-width:880px){.hero .wrap{grid-template-columns:1fr}.grid,.road{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}h1.head{font-size:40px}.nav nav{display:none}}

  /* performance page */
  .pwrap{max-width:1120px;margin:0 auto;padding:0 24px}
  .phero{padding:64px 0 18px;background:
    radial-gradient(900px 360px at 80% -10%,rgba(220,38,38,.10),transparent 60%)}
  .phero h1{font-size:46px;line-height:1.05;letter-spacing:-.035em;font-weight:850;margin:10px 0 0}
  .phero h1 .accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .phero .sub{font-size:18px;color:var(--slate);margin:16px 0 0;max-width:760px}
  .psec{padding:46px 0}
  .psec h2{font-size:28px;letter-spacing:-.03em;font-weight:820;margin:0}
  .psec .cap{color:var(--slate);font-size:14px;margin:10px 0 0;max-width:900px}
  .psec .note{color:var(--slate);font-size:13px;margin:14px 0 0;max-width:900px;font-style:italic}
  .tablewrap{margin-top:22px;overflow-x:auto;border:1px solid var(--line);border-radius:14px}
  table.bench{border-collapse:collapse;width:100%;font-size:13.5px;min-width:640px}
  table.bench th,table.bench td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  table.bench th:first-child,table.bench td:first-child{text-align:left;font-weight:600}
  table.bench thead th{background:var(--bg-soft);font-weight:800;color:var(--ink);position:sticky;top:0}
  table.bench tbody tr:last-child td{border-bottom:none}
  table.bench tr.win{background:#f3fbf5}
  table.bench tr.win td:first-child:before{content:"✓ ";color:#1a7f37;font-weight:800}
  table.bench .xm{font-weight:800}
  table.bench tr.win .xm{color:#1a7f37}
  table.bench tr.lose .xm{color:var(--ruby-deep)}
  td.na{color:#a8b0bd}
  .pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}
  .pcard{border:1px solid var(--line);border-radius:16px;padding:22px;background:#fff}
  .pcard .n{font-size:30px;font-weight:850;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .pcard h3{margin:6px 0 6px;font-size:16px}
  .pcard p{margin:0;color:var(--slate);font-size:14px}
  .applist{margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .appcard{border:1px solid var(--line);border-radius:16px;padding:22px;background:#fff}
  .appcard h3{margin:0 0 8px;font-size:16px}
  .appcard p{margin:0;color:var(--slate);font-size:14px}
  .appcard ul{margin:8px 0 0;padding-left:18px;color:var(--slate);font-size:14px}
  .appcard b{color:var(--ink)}
  .backlink{display:inline-flex;align-items:center;gap:6px;color:var(--ruby);font-weight:700;font-size:14px;margin-top:8px}
  @media(max-width:880px){.pcards{grid-template-columns:1fr}.applist{grid-template-columns:1fr}.phero h1{font-size:36px}.nav nav{display:none}}
</style>
