baseURL = "https://go-embedded-ruby.github.io/"
title = "go-embedded-ruby"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.phases]]
  name = "Phase 0 — Vertical slice"
  status = "ready"
  blurb = "Lexer → parser → compiler → bytecode VM, end to end. Integers, floats, strings, locals, arithmetic, if/unless, while/until, statement modifiers, def + recursion. Runs `puts 1 + 2` and `fib(20)`."
[[params.phases]]
  name = "Phase 1 — Object model & dispatch"
  status = "ready"
  blurb = "Classes, modules, mutable method tables, singleton classes, blocks & yield, Proc/lambda, method_missing — the live object model that makes monkey-patching free."
[[params.phases]]
  name = "Phase 2 — Core types & mixins"
  status = "planned"
  blurb = "Integer (bignum), Float, byte-based String + encodings, Symbol, Array, ordered Hash, Range. Comparable and Enumerable written once, in embedded Ruby."
[[params.phases]]
  name = "Phase 3 — Control flow & Fiber"
  status = "planned"
  blurb = "Exceptions via catch tables, raise/rescue/ensure/retry, non-local break/next/redo/return, Fiber on goroutines, Enumerator and lazy."
[[params.phases]]
  name = "Phase 4 — Metaprogramming"
  status = "planned"
  blurb = "define_method, instance/class_eval, constant machinery, hooks (included/inherited/method_added), and string eval."
[[params.phases]]
  name = "Phase 5 — Full front-end"
  status = "planned"
  blurb = "Heredocs, interpolation, %-literals, multiple assignment, keyword args, pattern matching, endless methods, safe navigation, numbered params."
[[params.phases]]
  name = "Phase 6 — Standard library"
  status = "planned"
  blurb = "IO/File/Time/Random/Thread, Regexp (pure-Go Onigmo via the go-onigmo org), Marshal, embedded pure-Ruby libs, Go-native leaves (json, digest, zlib)."
[[params.phases]]
  name = "Phase 7 — Build toolchain"
  status = "planned"
  blurb = "rbgo build: scan the require graph, tree-shake the stdlib with build tags, embed bytecode, emit one static binary. Closed-world mode drops the front-end."
[[params.phases]]
  name = "Phase 8 — Conformance & performance"
  status = "planned"
  blurb = "ruby/spec subset, inline method caches, fixnum cache, reduced boxing."
