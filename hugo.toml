baseURL = "https://go-embedded-ruby.github.io/"
title = "go-embedded-ruby"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.phases]]
  name = "Phase 0 — Vertical slice"
  status = "ready"
  blurb = "Lexer → parser → compiler → bytecode VM, end to end. Integers, floats, strings, locals, arithmetic, if/unless, while/until, statement modifiers, def + recursion. Runs `puts 1 + 2` and `fib(20)`."
[[params.phases]]
  name = "Phase 1 — Object model & dispatch"
  status = "ready"
  blurb = "Classes, modules, inheritance, mutable method tables, `@ivars`, `new`/`initialize`, constants, `include` mixins, `super`, blocks & `yield`, `block_given?`, method_missing — the live object model that makes monkey-patching free."
[[params.phases]]
  name = "Phase 2 — Core types & mixins"
  status = "active"
  blurb = "Integer (with **Bignum** promotion + arbitrary-precision literals), Float, immutable String, Symbol, Array, ordered Hash, Range (incl. beginless/endless). Full argument system (optional/`*splat`/keyword/`**rest`/`&block`), Proc/lambda/stabby `->(){}`, `Symbol#to_proc`, class methods, `attr_accessor`, `Struct`. Comparable and Enumerable written once, in embedded Ruby."
[[params.phases]]
  name = "Phase 3 — Control flow & Fiber"
  status = "active"
  blurb = "Exception hierarchy, `raise`/`rescue`/`ensure`/`else`/`retry` (block- and method-level), non-local `break`/`next`, `Kernel#loop`. Fiber, Enumerator and lazy still ahead."
[[params.phases]]
  name = "Phase 4 — Metaprogramming"
  status = "active"
  blurb = "`define_method`, `instance_eval`/`instance_exec`, `class_eval`/`module_eval`/`class_exec`, `send`/`public_send`, `respond_to?`, `instance_variable_get`/`set`/`defined?`, `tap`/`then`. Hooks and string eval still ahead."
[[params.phases]]
  name = "Phase 5 — Full front-end"
  status = "active"
  blurb = "Interpolation, keyword args, endless methods (`def foo = expr`), beginless/endless ranges, the stabby lambda, multiple assignment, full pattern matching `case/in` (value/bind/class/array/hash/find/pin/alternative, guards, one-line `=>`/`in`), safe navigation `&.` and numbered params (`_1`/`it`) already landed. Heredocs and %-literals still ahead."
[[params.phases]]
  name = "Phase 6 — Standard library"
  status = "active"
  blurb = "Regexp bridge landed: `/re/imx` literals, `Regexp`/`MatchData`, `=~`/`match`/`scan`/`gsub`/`sub`/`split` and the match globals, on the pure-Go Onigmo engine (go-onigmo org). IO/File/Time/Random/Thread, Marshal, embedded pure-Ruby libs and Go-native leaves (json, digest, zlib) still ahead."
[[params.phases]]
  name = "Phase 7 — Build toolchain"
  status = "planned"
  blurb = "rbgo build: scan the require graph, tree-shake the stdlib with build tags, embed bytecode, emit one static binary. Closed-world mode drops the front-end."
[[params.phases]]
  name = "Phase 8 — Conformance & performance"
  status = "planned"
  blurb = "ruby/spec subset, inline method caches, fixnum cache, reduced boxing."
